name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Lint & build (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `npm run build` runs `tsc -b` (strict) then `vite build`.
      - name: Type-check & build
        run: npm run build
